<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blissful Bites — Prijscalculator</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧮</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #232b24;
    --bg-deep: #1a201b;
    --paper: #faf6ea;
    --paper-line: #e4ddc8;
    --ink: #262420;
    --ink-soft: #6b6557;
    --brass: #b6883a;
    --brass-deep: #8f6a2c;
    --pine: #2f4538;
    --pine-soft: #50705c;
    --warn: #a3493a;
    --radius: 10px;
    font-size: 16px;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(ellipse at top, rgba(255,255,255,0.04), transparent 60%),
      var(--bg);
    font-family:'Inter', system-ui, sans-serif;
    color: var(--ink);
    padding: 32px 16px 64px;
    display:flex;
    justify-content:center;
  }

  .wrap{ width:100%; max-width: 700px; }

  /* ---------- header ---------- */
  header{
    text-align:center;
    margin-bottom: 22px;
    color: #ece6d4;
  }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.18em;
    color: var(--brass);
    text-transform: uppercase;
    margin: 0 0 6px;
  }
  h1{
    font-family:'Fraunces', serif;
    font-weight: 600;
    font-size: clamp(28px, 5vw, 38px);
    margin: 0 0 8px;
  }
  .sub{
    font-size: 14px;
    color: #b9b2a0;
    max-width: 440px;
    margin: 0 auto;
  }

  /* ---------- top bar buttons ---------- */
  .topbar{
    display:flex;
    justify-content:center;
    gap:10px;
    margin: 18px 0 22px;
    flex-wrap: wrap;
  }
  button.ghost{
    background: transparent;
    border: 1px solid rgba(236,230,212,0.3);
    color: #ece6d4;
    font-family:'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    padding: 9px 16px;
    border-radius: 999px;
    cursor:pointer;
    transition: all .15s ease;
  }
  button.ghost:hover{ background: rgba(236,230,212,0.1); border-color: var(--brass); }
  button.ghost.active{ background: var(--brass); border-color: var(--brass); color: #211a0e; }

  /* ---------- settings panel ---------- */
  .settings{
    display:none;
    background: rgba(250,246,234,0.06);
    border: 1px solid rgba(236,230,212,0.18);
    border-radius: var(--radius);
    padding: 18px 18px 8px;
    margin-bottom: 22px;
    color: #ece6d4;
  }
  .settings.open{ display:block; }
  .settings h3{
    font-family:'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--brass);
    margin: 0 0 14px;
  }
  .settings-grid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px 16px;
  }
  @media (max-width: 520px){ .settings-grid{ grid-template-columns: 1fr; } }
  .setting-field label{
    display:block;
    font-size: 12.5px;
    color: #cfc8b4;
    margin-bottom: 4px;
  }
  .setting-field input{
    width:100%;
    background: rgba(0,0,0,0.2);
    border: 1px solid rgba(236,230,212,0.25);
    border-radius: 6px;
    color: #ece6d4;
    font-family:'IBM Plex Mono', monospace;
    font-size: 14px;
    padding: 7px 9px;
  }
  .setting-field input:focus{ outline: none; border-color: var(--brass); }
  .settings-foot{
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px dashed rgba(236,230,212,0.2);
    display:flex;
    justify-content: flex-end;
  }
  .settings-foot button{
    background:none;
    border:none;
    color:#cfc8b4;
    font-size: 12.5px;
    text-decoration: underline;
    cursor:pointer;
  }
  .settings-foot button:hover{ color: var(--brass); }

  /* ---------- ticket ---------- */
  .ticket{
    position:relative;
    background: var(--paper);
    border-radius: 2px 2px var(--radius) var(--radius);
    padding: 30px 26px 4px;
    clip-path: polygon(
      0% 10px, 4% 2px, 8% 10px, 12% 2px, 16% 10px, 20% 2px, 24% 10px, 28% 2px,
      32% 10px, 36% 2px, 40% 10px, 44% 2px, 48% 10px, 52% 2px, 56% 10px, 60% 2px,
      64% 10px, 68% 2px, 72% 10px, 76% 2px, 80% 10px, 84% 2px, 88% 10px, 92% 2px,
      96% 10px, 100% 2px, 100% 100%, 0% 100%
    );
    box-shadow: 0 18px 40px rgba(0,0,0,0.35);
  }

  .group{ margin-bottom: 6px; }
  .group-title{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11.5px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--pine-soft);
    margin: 22px 0 4px;
    display:flex;
    align-items:center;
    gap: 8px;
  }
  .group-title::after{
    content:"";
    flex:1;
    height:1px;
    background: var(--paper-line);
  }
  .group-formula{
    font-size: 11.5px;
    color: var(--ink-soft);
    margin: 0 0 10px;
    font-style: italic;
  }

  .row{
    display:grid;
    grid-template-columns: 1.5fr 78px 84px 116px 88px;
    align-items:center;
    gap: 8px;
    padding: 10px 0;
    border-bottom: 1px dashed var(--paper-line);
  }
  .row:last-child{ border-bottom:none; }
  .col-label{ display:flex; flex-direction:column; }
  .item-name{ font-weight: 600; font-size: 14.5px; }
  .item-note{ font-size: 11px; color: var(--ink-soft); }
  .col-head{
    font-family:'IBM Plex Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-soft);
    text-align: right;
  }

  input.num{
    width:100%;
    text-align:right;
    font-family:'IBM Plex Mono', monospace;
    font-size: 13.5px;
    border: 1px solid var(--paper-line);
    border-radius: 6px;
    padding: 6px 7px;
    background: #fff;
    color: var(--ink);
  }
  input.num:focus{ outline:none; border-color: var(--brass); }
  input.aantal{ font-weight: 600; text-align:center; }
  input.aantal:not([value="0"]):not([value=""]){ border-color: var(--brass); background: #fffaf0; }

  .stepper{
    display:flex;
    align-items:center;
    gap: 4px;
  }
  .stepper .aantal{ flex:1; min-width: 0; padding: 6px 2px; }
  .step-btn{
    flex: 0 0 26px;
    width: 26px;
    height: 26px;
    border-radius: 6px;
    border: 1px solid var(--paper-line);
    background: #fff;
    color: var(--pine);
    font-size: 16px;
    font-weight: 700;
    line-height: 1;
    cursor: pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 0;
    transition: background .12s ease, border-color .12s ease, color .12s ease;
  }
  .step-btn:hover{ background: var(--paper); border-color: var(--brass); color: var(--brass-deep); }
  .step-btn:active{ background: var(--brass); color: #fff; border-color: var(--brass); }

  .verkoopprijs{
    text-align:right;
    font-family:'IBM Plex Mono', monospace;
    font-size: 13.5px;
    color: var(--pine);
    font-weight: 600;
  }
  .verkoopprijs.vast{ color: var(--brass-deep); }
  .verkoopprijs .badge{
    display:block;
    font-family:'Inter', sans-serif;
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--brass-deep);
    letter-spacing: 0.05em;
  }

  .subtotal{
    text-align:right;
    font-family:'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
  }

  /* ---------- totals ---------- */
  .totals{
    margin-top: 18px;
    padding: 18px 0 22px;
    border-top: 2px dashed var(--paper-line);
  }
  .total-line{
    display:flex;
    justify-content:space-between;
    font-family:'IBM Plex Mono', monospace;
    font-size: 14px;
    color: var(--ink-soft);
    padding: 3px 0;
  }
  .total-line.grand{
    margin-top: 8px;
    padding-top: 12px;
    border-top: 1px solid var(--paper-line);
    font-size: 24px;
    font-weight: 700;
    color: var(--ink);
  }
  .total-line.grand .amount{ color: var(--brass-deep); }
  .margin-line{
    text-align:right;
    font-size: 11.5px;
    color: var(--pine-soft);
    margin-top: 6px;
  }

  .actions{
    display:flex;
    justify-content:center;
    gap: 10px;
    flex-wrap: wrap;
    margin: 22px 0 0;
  }
  button.reset{
    background: var(--pine);
    color: #f3efe0;
    border:none;
    font-family:'Inter', sans-serif;
    font-weight: 600;
    font-size: 13.5px;
    padding: 11px 22px;
    border-radius: 999px;
    cursor:pointer;
    transition: background .15s ease;
  }
  button.reset:hover{ background: var(--pine-soft); }
  button.reset.alt{ background: var(--brass-deep); }
  button.reset.alt:hover{ background: var(--brass); }

  footer{
    text-align:center;
    color: #847d6c;
    font-size: 11.5px;
    margin-top: 26px;
  }

  @media (max-width: 560px){
    .row{
      grid-template-columns: 1fr 1fr;
      grid-template-areas:
        "label label"
        "kost verkoop"
        "aantal subtotal";
      row-gap: 6px;
      padding: 14px 0;
    }
    .row .col-label{ grid-area: label; }
    .row .col-kost{ grid-area: kost; }
    .row .col-verkoop{ grid-area: verkoop; }
    .row .col-aantal{ grid-area: aantal; }
    .row .col-subtotal{ grid-area: subtotal; }
    .col-head{ display:none; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <p class="eyebrow">Blissful Bites</p>
    <h1>Prijscalculator</h1>
    <p class="sub">Vul het aantal in per product en zie direct de totaalprijs voor de bestelling.</p>
  </header>

  <div class="topbar">
    <button class="ghost" id="toggleSettings">⚙️ Instellingen</button>
    <button class="ghost" id="toggleFormules">🧮 Toon berekening</button>
  </div>

  <div class="settings" id="settingsPanel">
    <h3>Rekenregels</h3>
    <div class="settings-grid">
      <div class="setting-field">
        <label for="s_pct">Overige kosten (%)</label>
        <input type="number" id="s_pct" class="num" step="0.1" min="0">
      </div>
      <div class="setting-field">
        <label for="s_extraStuk">Extra per stuk (€)</label>
        <input type="number" id="s_extraStuk" class="num" step="0.01" min="0">
      </div>
      <div class="setting-field">
        <label for="s_bestelkosten">Bestelkosten, eenmalig (€)</label>
        <input type="number" id="s_bestelkosten" class="num" step="0.5" min="0">
      </div>
      <div class="setting-field">
        <label for="s_baklava">Baklava: extra per schaal (€)</label>
        <input type="number" id="s_baklava" class="num" step="0.5" min="0">
      </div>
      <div class="setting-field">
        <label for="s_tarator">Tarator: extra per schaal (€)</label>
        <input type="number" id="s_tarator" class="num" step="0.5" min="0">
      </div>
      <div class="setting-field">
        <label for="s_msabak">Msabak: vaste kiloprijs (€/kg)</label>
        <input type="number" id="s_msabak" class="num" step="0.5" min="0">
      </div>
      <div class="setting-field">
        <label for="s_halawet">Halawet jben: vaste kiloprijs (€/kg)</label>
        <input type="number" id="s_halawet" class="num" step="0.5" min="0">
      </div>
      <div class="setting-field">
        <label for="s_kbebat">Kbebat: vaste stukprijs (€)</label>
        <input type="number" id="s_kbebat" class="num" step="0.01" min="0">
      </div>
    </div>
    <div class="settings-foot">
      <button id="resetSettings">Standaardwaarden herstellen</button>
    </div>
  </div>

  <div class="ticket">
    <div id="groups"></div>

    <div class="totals">
      <div class="total-line"><span>Subtotaal producten</span><span id="t_subtotaal">€ 0,00</span></div>
      <div class="total-line"><span>Bestelkosten (eenmalig)</span><span id="t_bestelkosten">€ 0,00</span></div>
      <div class="total-line grand"><span>Totaal</span><span class="amount" id="t_totaal">€ 0,00</span></div>
      <div class="margin-line" id="t_marge"></div>
    </div>
  </div>

  <div class="actions">
    <button class="reset" id="nieuweBestelling">Nieuwe bestelling</button>
    <button class="reset alt" id="kopieerQuote">📋 Kopieer prijsopgave</button>
    <button class="reset alt" id="deelWhatsapp">📤 Delen via WhatsApp</button>
  </div>

  <footer>Voor intern gebruik · Blissful Bites</footer>
</div>

<script>
/* ===================== DATA ===================== */

const DEFAULT_SETTINGS = {
  pct: 10,            // overige kosten in %
  extraStuk: 0.50,    // extra per stuk
  bestelkosten: 15,   // eenmalig per bestelling
  baklava: 20,        // extra per schaal
  tarator: 15,        // extra per schaal
  msabak: 15,         // vaste kiloprijs msabak
  halawet: 20,        // vaste kiloprijs halawet jben
  kbebat: 0.85        // vaste stukprijs kbebat
};

// kostprijs = inkoopprijs zoals opgegeven, omgerekend naar de eenheid waarin verkocht wordt
const ITEMS = [
  { id:'kebbe',         naam:'Kebbe',                  groep:'stuk',   eenheid:'stuk',   kostprijs:0.40 },
  { id:'lahmacun',      naam:'Lahmacun',                groep:'stuk',   eenheid:'stuk',   kostprijs:0.40 },
  { id:'mini_lahmacun', naam:'Mini lahmacun',           groep:'stuk',   eenheid:'stuk',   kostprijs:0.20 },
  { id:'samboesak',     naam:'Samboesak',                groep:'stuk',   eenheid:'stuk',   kostprijs:0.30 },
  { id:'mini_pizza',    naam:'Mini pizza',               groep:'stuk',   eenheid:'stuk',   kostprijs:0.50 },
  { id:'wraps',         naam:'Wraps',                    groep:'stuk',   eenheid:'stuk',   kostprijs:0.83 },
  { id:'mini_burgers',  naam:'Mini burgers',             groep:'stuk',   eenheid:'stuk',   kostprijs:0.55 },
  { id:'kaasbroodje',   naam:'Kaasbroodje',              groep:'stuk',   eenheid:'stuk',   kostprijs:0.35 },
  { id:'chamborak',     naam:'Chamborak',                 groep:'stuk',   eenheid:'stuk',   kostprijs:0.30 },
  { id:'loempia',       naam:'Loempia',                   groep:'stuk',   eenheid:'stuk',   kostprijs:0.43 },
  { id:'baklava_ballen',naam:'Baklava ballen',            groep:'stuk',   eenheid:'stuk',   kostprijs:0.37 },
  { id:'kbebat',        naam:'Kbebat',                    groep:'stuk',   eenheid:'stuk',   kostprijs:0.25, note:'vaste stukprijs' },

  { id:'baklava_schaal',naam:'Baklava',                   groep:'schaal', eenheid:'schaal', kostprijs:15.00, note:'45 stuks per schaal' },
  { id:'tarator_schaal',naam:'Tarator',                    groep:'schaal', eenheid:'schaal', kostprijs:15.00 },

  { id:'msabak',        naam:'Msabak',                     groep:'kg',     eenheid:'kg',     kostprijs:2.20,  note:'vaste kiloprijs' },
  { id:'halawet_jben',  naam:'Halawet jben',               groep:'kg',     eenheid:'kg',     kostprijs:5.50,  note:'vaste kiloprijs' },
];

const GROUP_LABELS = {
  stuk:   { title:'Per stuk',   formula:'Verkoopprijs = (kostprijs + overige kosten) + extra per stuk' },
  schaal: { title:'Per schaal', formula:'Verkoopprijs = (kostprijs + overige kosten) + vaste toeslag per schaal' },
  kg:     { title:'Per kilo',   formula:'Msabak en Halawet jben hebben allebei een vaste kiloprijs' },
};

let settings = { ...DEFAULT_SETTINGS };
let kostprijzen = {};
ITEMS.forEach(i => kostprijzen[i.id] = i.kostprijs);
let aantallen = {};
ITEMS.forEach(i => aantallen[i.id] = 0);

/* ===================== OPSLAG ===================== */

function laadOpslag(){
  try{
    const s = JSON.parse(localStorage.getItem('bb_settings'));
    if (s) settings = { ...DEFAULT_SETTINGS, ...s };
    const k = JSON.parse(localStorage.getItem('bb_kostprijzen'));
    if (k) kostprijzen = { ...kostprijzen, ...k };
  }catch(e){ /* negeer corrupte opslag */ }
}
function bewaarOpslag(){
  localStorage.setItem('bb_settings', JSON.stringify(settings));
  localStorage.setItem('bb_kostprijzen', JSON.stringify(kostprijzen));
}

/* ===================== REKENEN ===================== */

function round2(n){ return Math.round((n + Number.EPSILON) * 100) / 100; }

function verkoopprijs(item){
  const kp = kostprijzen[item.id];
  const metOverige = kp * (1 + settings.pct / 100);

  if (item.id === 'kbebat')        return { prijs: round2(settings.kbebat), vast:true };
  if (item.id === 'msabak')        return { prijs: round2(settings.msabak), vast:true };
  if (item.id === 'halawet_jben')  return { prijs: round2(settings.halawet), vast:true };
  if (item.id === 'baklava_schaal')return { prijs: round2(metOverige + settings.baklava), vast:false };
  if (item.id === 'tarator_schaal')return { prijs: round2(metOverige + settings.tarator), vast:false };
  if (item.groep === 'kg')         return { prijs: round2(metOverige), vast:false };
  return { prijs: round2(metOverige + settings.extraStuk), vast:false };
}

function euro(n){
  return n.toLocaleString('nl-NL', { style:'currency', currency:'EUR' });
}

const EENHEID_LABEL = { stuk:'stuks', schaal:'schalen', kg:'kg' };

/* ===================== RENDEREN ===================== */

function renderGroups(){
  const wrap = document.getElementById('groups');
  wrap.innerHTML = '';
  ['stuk','schaal','kg'].forEach(groepKey => {
    const items = ITEMS.filter(i => i.groep === groepKey);
    if (!items.length) return;

    const titel = document.createElement('div');
    titel.className = 'group-title';
    titel.textContent = GROUP_LABELS[groepKey].title;
    wrap.appendChild(titel);

    const formule = document.createElement('p');
    formule.className = 'group-formula formule-tekst';
    formule.textContent = GROUP_LABELS[groepKey].formula;
    formule.style.display = formulesZichtbaar ? 'block' : 'none';
    wrap.appendChild(formule);

    const head = document.createElement('div');
    head.className = 'row';
    head.innerHTML = `
      <div class="col-head" style="text-align:left;">Product</div>
      <div class="col-head">Kostprijs</div>
      <div class="col-head">Verkoop</div>
      <div class="col-head">Aantal</div>
      <div class="col-head">Subtotaal</div>`;
    wrap.appendChild(head);

    items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'row';
      row.dataset.id = item.id;

      row.innerHTML = `
        <div class="col-label">
          <span class="item-name">${item.naam}</span>
          ${item.note ? `<span class="item-note">${item.note}</span>` : ''}
        </div>
        <div class="col-kost">
          <input type="number" class="num kostprijs-input" step="0.01" min="0" value="${kostprijzen[item.id]}">
        </div>
        <div class="col-verkoop verkoopprijs"></div>
        <div class="col-aantal">
          <div class="stepper">
            <button type="button" class="step-btn step-min" aria-label="Verminderen">−</button>
            <input type="number" class="num aantal" step="${item.eenheid === 'kg' ? '0.5' : '1'}" min="0" value="${aantallen[item.id] || ''}" placeholder="0">
            <button type="button" class="step-btn step-plus" aria-label="Vermeerderen">+</button>
          </div>
        </div>
        <div class="col-subtotal subtotal">€ 0,00</div>
      `;
      wrap.appendChild(row);
    });
  });
  herberekenAlles();
}

function herberekenAlles(){
  let subtotaal = 0;
  let kostprijsTotaal = 0;
  let heeftItems = false;

  document.querySelectorAll('.row[data-id]').forEach(row => {
    const id = row.dataset.id;
    const item = ITEMS.find(i => i.id === id);

    const vp = verkoopprijs(item);
    const aantal = parseFloat(row.querySelector('.aantal').value) || 0;
    const sub = round2(vp.prijs * aantal);

    if (aantal > 0) heeftItems = true;
    subtotaal += sub;
    kostprijsTotaal += kostprijzen[id] * aantal;

    const vEl = row.querySelector('.verkoopprijs');
    vEl.innerHTML = `${euro(vp.prijs)}<span class="badge">${vp.vast ? 'vast' : 'per ' + EENHEID_LABEL[item.eenheid].replace(/s$/, '')}</span>`;
    vEl.classList.toggle('vast', vp.vast);

    row.querySelector('.subtotal').textContent = euro(sub);
  });

  const bestelkosten = heeftItems ? settings.bestelkosten : 0;
  const totaal = round2(subtotaal + bestelkosten);
  const marge = round2(totaal - kostprijsTotaal);
  const margePct = totaal > 0 ? round2((marge / totaal) * 100) : 0;

  document.getElementById('t_subtotaal').textContent = euro(round2(subtotaal));
  document.getElementById('t_bestelkosten').textContent = euro(bestelkosten);
  document.getElementById('t_totaal').textContent = euro(totaal);
  document.getElementById('t_marge').textContent = heeftItems
    ? `Kostprijs: ${euro(round2(kostprijsTotaal))} · Marge: ${euro(marge)} (${margePct}%)`
    : '';
}

document.getElementById('groups').addEventListener('click', (e) => {
  const btn = e.target.closest('.step-btn');
  if (!btn) return;
  const row = btn.closest('.row[data-id]');
  const item = ITEMS.find(i => i.id === row.dataset.id);
  const input = row.querySelector('.aantal');
  const step = item.eenheid === 'kg' ? 0.5 : 1;
  let val = parseFloat(input.value) || 0;
  val = btn.classList.contains('step-plus') ? round2(val + step) : Math.max(0, round2(val - step));
  input.value = val === 0 ? '' : val;
  herberekenAlles();
});

/* ===================== PRIJSOPGAVE EXPORTEREN ===================== */

function buildQuoteText(){
  const lijn = '-'.repeat(28);
  const regels = ['Prijsopgave - Blissful Bites', lijn];
  let subtotaal = 0;

  document.querySelectorAll('.row[data-id]').forEach(row => {
    const item = ITEMS.find(i => i.id === row.dataset.id);
    const aantal = parseFloat(row.querySelector('.aantal').value) || 0;
    if (aantal <= 0) return;
    const vp = verkoopprijs(item);
    const sub = round2(vp.prijs * aantal);
    subtotaal += sub;
    const aantalTxt = (item.eenheid === 'kg' ? aantal.toString().replace('.', ',') : aantal) + ' ' + EENHEID_LABEL[item.eenheid];
    regels.push(`${item.naam} (${aantalTxt}): ${euro(sub)}`);
  });

  if (subtotaal === 0) return null;

  const bestelkosten = settings.bestelkosten;
  const totaal = round2(subtotaal + bestelkosten);
  regels.push(lijn);
  regels.push(`Subtotaal: ${euro(round2(subtotaal))}`);
  regels.push(`Bestelkosten: ${euro(bestelkosten)}`);
  regels.push(`Totaal: ${euro(totaal)}`);
  return regels.join('\n');
}

async function kopieerNaarKlembord(tekst){
  if (navigator.clipboard && window.isSecureContext){
    try{ await navigator.clipboard.writeText(tekst); return true; }catch(e){ /* val terug op onderstaande methode */ }
  }
  const ta = document.createElement('textarea');
  ta.value = tekst;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  let gelukt = false;
  try{ gelukt = document.execCommand('copy'); }catch(e){ /* niet ondersteund */ }
  document.body.removeChild(ta);
  return gelukt;
}

document.getElementById('kopieerQuote').addEventListener('click', async (e) => {
  const tekst = buildQuoteText();
  if (!tekst){ alert('Vul eerst een aantal in bij minstens één product.'); return; }
  const ok = await kopieerNaarKlembord(tekst);
  const btn = e.currentTarget;
  const orig = btn.textContent;
  btn.textContent = ok ? '✓ Gekopieerd' : 'Kopiëren mislukt';
  setTimeout(() => { btn.textContent = orig; }, 1800);
});

document.getElementById('deelWhatsapp').addEventListener('click', () => {
  const tekst = buildQuoteText();
  if (!tekst){ alert('Vul eerst een aantal in bij minstens één product.'); return; }
  window.open('https://wa.me/?text=' + encodeURIComponent(tekst), '_blank');
});
document.getElementById('groups').addEventListener('input', (e) => {
  if (e.target.classList.contains('kostprijs-input')){
    const row = e.target.closest('.row[data-id]');
    kostprijzen[row.dataset.id] = parseFloat(e.target.value) || 0;
    bewaarOpslag();
  }
  herberekenAlles();
});

laadOpslag();
vulSettingsForm();
renderGroups();
